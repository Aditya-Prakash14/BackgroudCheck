[build]
  command = "npm ci && npm run build:all"
  functions = "backend/dist"
  publish = "frontend/.next"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server:path"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm ci && npm run build:all"
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  command = "npm ci && npm run build:all"

[context.branch-deploy]
  command = "npm ci && npm run build:all"
