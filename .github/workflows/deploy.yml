name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  deploy-to-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    
    environment:
      name: production
      url: https://bgv-platform.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: vercel/action@v4.3.3
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: true

      - name: Deployment Success
        run: echo "✅ Deployed to Vercel - https://bgv-platform.vercel.app"

  database-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-to-vercel
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run database migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true

      - name: Generate Prisma Client
        run: cd backend && npm run prisma:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-to-vercel
    
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Test frontend
        run: curl -f https://bgv-platform.vercel.app/ --max-time 10
        continue-on-error: true

      - name: Deployment verification
        run: echo "✅ Deployment health check complete"
