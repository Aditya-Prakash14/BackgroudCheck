name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        directory: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Install dependencies
        run: cd ${{ matrix.directory }} && npm ci

      - name: Audit npm dependencies
        run: cd ${{ matrix.directory }} && npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for license compliance
        run: cd ${{ matrix.directory }} && npm ls --depth=0 2>/dev/null | head -20
        continue-on-error: true

  type-checking:
    name: TypeScript Type Checking
    runs-on: ubuntu-latest

    strategy:
      matrix:
        directory: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Install dependencies
        run: cd ${{ matrix.directory }} && npm ci

      - name: Type check
        run: cd ${{ matrix.directory }} && npx tsc --noEmit
        continue-on-error: true
